name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-macos:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            goarch: amd64
          - runner: macos-15
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      VERSION: ${{ github.ref_name }}
      GOOS: darwin
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"

      - name: Run verification
        run: |
          go test ./...
          go vet ./...

      - name: Build udl
        run: |
          version_no_v="${VERSION#v}"
          mkdir -p dist
          go build \
            -ldflags "-s -w -X main.version=${version_no_v} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/udl" \
            ./cmd/udl

      - name: Build macOS bundle
        run: |
          VERSION="${VERSION#v}" \
          GOARCH="${GOARCH}" \
          UDL_BIN="dist/udl" \
          bash ./packaging/release/build_macos_bundle.sh

      - name: Smoke test macOS bundle
        run: |
          bash ./packaging/release/smoke_macos_bundle.sh "dist/udl-v${VERSION#v}-darwin-${GOARCH}.tar.gz"

      - name: Upload macOS release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-darwin-${{ matrix.goarch }}
          path: |
            dist/udl-v*-darwin-${{ matrix.goarch }}.tar.gz
            dist/udl-v*-darwin-${{ matrix.goarch }}.tar.gz.sha256

  publish:
    runs-on: ubuntu-latest
    needs: build-macos
    permissions:
      contents: write
    env:
      VERSION: ${{ github.ref_name }}
      RELEASE_REPO: ${{ github.repository }}
      HOMEBREW_TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Flatten artifact layout
        run: |
          find dist -mindepth 2 -type f -print0 | while IFS= read -r -d '' file; do
            cp "$file" "dist/$(basename "$file")"
          done

      - name: Build SHA256SUMS
        run: |
          cat dist/*.sha256 > dist/SHA256SUMS

      - name: Render Homebrew formula
        run: |
          version_no_v="${VERSION#v}"
          amd64_sha="$(awk '/darwin-amd64.tar.gz$/ {print $1}' dist/SHA256SUMS)"
          arm64_sha="$(awk '/darwin-arm64.tar.gz$/ {print $1}' dist/SHA256SUMS)"
          bash ./packaging/homebrew/render_formula.sh "$version_no_v" "${RELEASE_REPO}" "$amd64_sha" "$arm64_sha" "dist/udl.rb"

      - name: Verify rendered Homebrew formula
        run: |
          ruby -c dist/udl.rb
          grep -F 'depends_on "scdl"' dist/udl.rb
          grep -F 'depends_on "yt-dlp"' dist/udl.rb
          grep -F 'bin.install "udl"' dist/udl.rb

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          files=(
            dist/udl-v*-darwin-amd64.tar.gz
            dist/udl-v*-darwin-arm64.tar.gz
            dist/SHA256SUMS
            dist/udl.rb
          )

          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${files[@]}" --clobber
          else
            gh release create "${VERSION}" "${files[@]}" --title "${VERSION}" --notes ""
          fi

      - name: Update Homebrew tap formula
        if: ${{ env.HOMEBREW_TAP_REPO != '' }}
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "${HOMEBREW_TAP_TOKEN}"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp dist/udl.rb tap/Formula/udl.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/udl.rb
          git commit -m "release: update udl ${VERSION}"
          git push
